version: '3.8'

services:

  neo4j:
    image: neo4j:5-community
    container_name: chhaya-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    environment:
      NEO4J_AUTH: neo4j/chhaya123
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  api:
    build: ./backend
    container_name: chhaya-api
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: chhaya123

  etl:
    build: ./data-pipeline
    container_name: chhaya-etl
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: chhaya123
    restart: "no"

volumes:
  neo4j-data:
